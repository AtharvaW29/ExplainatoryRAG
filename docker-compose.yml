services:
  app:
    build:
      context: ./api
      dockerfile: DockerFile

    working_dir: /api

    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8000

    volumes:
      - ./api:/api

    ports:
      - "8001:8000"

    env_file:
      - ./api/.env

    depends_on:
      db:
        condition: service_healthy

    networks:
      - app-network

  db:
    image: postgres:16

    restart: always

    environment:
      POSTGRES_USER: ${app_DB_USER}
      POSTGRES_PASSWORD: ${app_DB_PASSWORD}
      POSTGRES_DB: ${app_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${app_DB_USER} -d ${app_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - app-network

  client:
    build:
      context: ./app
      dockerfile: DockerFile
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - app
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
